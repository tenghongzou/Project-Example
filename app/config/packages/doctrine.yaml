doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App
            # 各業務模組的 Domain 實體（每模組獨立 PG schema，見 ARCHITECTURE.md）
            EventManage:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/EventManage/Domain'
                prefix: 'App\EventManage\Domain'
                alias: EventManage
            FlowEngine:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/FlowEngine/Domain'
                prefix: 'App\FlowEngine\Domain'
                alias: FlowEngine
            Notification:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Notification/Domain'
                prefix: 'App\Notification\Domain'
                alias: Notification

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
