# PHP 服務共用的環境變數（app 與 worker）
x-php-env: &php-env
  APP_ENV: dev
  DATABASE_URL: "postgresql://app:app@database:5432/app?serverVersion=18&charset=utf8"
  REDIS_URL: "redis://redis:6379"
  MESSENGER_TRANSPORT_DSN: "redis://redis:6379/messages"
  MESSENGER_FAILURE_TRANSPORT_DSN: "redis://redis:6379/failed"
  # OpenTelemetry 自動 instrumentation
  OTEL_PHP_AUTOLOAD_ENABLED: "true"
  OTEL_SERVICE_NAME: "symfony-app"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
  OTEL_METRICS_EXPORTER: "none"
  OTEL_LOGS_EXPORTER: "none"
  OTEL_PROPAGATORS: "baggage,tracecontext"
  TEMPORAL_ADDRESS: "temporal:7233"

x-php-depends: &php-depends
  database:
    condition: service_healthy
  redis:
    condition: service_started
  jaeger:
    condition: service_started

services:
  app:
    build:
      context: .
      dockerfile: docker/frankenphp/Dockerfile
      target: dev
    ports:
      - "8088:80"
    volumes:
      - ./app:/app
      - ./docker/frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment: *php-env
    depends_on: *php-depends

  # Messenger 非同步消費者：微服務拆分時可直接獨立部署
  worker:
    build:
      context: .
      dockerfile: docker/frankenphp/Dockerfile
      target: dev
    command: php bin/console messenger:consume async --time-limit=3600 -vv
    restart: unless-stopped
    # 基底映像的 healthcheck 是打 HTTP server，worker 沒有跑 HTTP，改檢查 consume 程序
    healthcheck:
      test: ["CMD-SHELL", "php bin/console messenger:stats async >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./app:/app
    environment:
      <<: *php-env
      OTEL_SERVICE_NAME: "symfony-worker"
      # 常駐消費者用 simple processor，span 即時匯出（batch 會積在緩衝內很久才出去）
      OTEL_PHP_TRACES_PROCESSOR: "simple"
    depends_on: *php-depends

  # Temporal 服務（dev 用 auto-setup：自動在共用的 PostgreSQL 建 temporal 資料庫與 schema）
  temporal:
    image: temporalio/auto-setup:latest
    environment:
      DB: "postgres12"
      DB_PORT: "5432"
      POSTGRES_USER: "app"
      POSTGRES_PWD: "app"
      POSTGRES_SEEDS: "database"
      DBNAME: "temporal"
      VISIBILITY_DBNAME: "temporal_visibility"
    ports:
      - "7233:7233"   # gRPC
    depends_on:
      database:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:latest
    environment:
      TEMPORAL_ADDRESS: "temporal:7233"
      TEMPORAL_CORS_ORIGINS: "http://localhost:8233"
    ports:
      - "8233:8080"   # Temporal Web UI
    depends_on:
      - temporal

  # Temporal PHP worker（RoadRunner 宿主，執行 workflow/activity code）
  temporal-worker:
    build:
      context: .
      dockerfile: docker/frankenphp/Dockerfile
      target: temporal-worker
    restart: unless-stopped
    volumes:
      - ./app:/app
    environment:
      <<: *php-env
      OTEL_SERVICE_NAME: "temporal-worker"
      OTEL_PHP_TRACES_PROCESSOR: "simple"
    # 基底映像的 healthcheck 打 HTTP server，此容器跑的是 RoadRunner，停用避免誤報
    healthcheck:
      disable: true
    depends_on:
      temporal:
        condition: service_started
      database:
        condition: service_healthy

  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      # postgres:18 起映像的資料目錄改為 /var/lib/postgresql（不再是 .../data）
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  jaeger:
    image: jaegertracing/jaeger:2.5.0
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP

volumes:
  db_data:
  redis_data:
  caddy_data:
  caddy_config:
